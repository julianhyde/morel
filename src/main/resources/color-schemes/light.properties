#
# Color scheme for the Morel shell, tuned for a light terminal
# background. Each entry maps a token category to zero or more attributes
# (bold, italic, underline, faint) followed by a color (an ANSI color
# name, an index 0-255, or #rrggbb). Categories that are omitted use the
# terminal's default style.
keyword: bold blue
symbol: blue
numeric: magenta
constant: magenta
string: green
comment: italic bright-black
typeVar: magenta
error: underline red
